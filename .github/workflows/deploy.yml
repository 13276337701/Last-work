name: Lab12 Final - Build & Deploy to EC2 via DockerHub

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PERSONAL_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/last-work
  TAG: latest

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 仅构建个人网站镜像（Todo 应用使用公共镜像无需构建）
      - name: Build and push personal website
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.PERSONAL_IMAGE }}:${{ env.TAG }}

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
            
            DEPLOY_DIR="/home/ubuntu/lab12-final"
            mkdir -p "$DEPLOY_DIR"
            cd "$DEPLOY_DIR"
            
            # 获取最新 docker-compose.yml
            if [ ! -f "docker-compose.yml" ]; then
              git clone https://github.com/${{ github.repository }}.git .
            else
              git pull origin main
            fi
            
            # 拉取两个服务的镜像并启动
            docker compose pull
            docker compose up -d --force-recreate
            docker image prune -f
            
            # 验证双服务运行状态
            sleep 5
            docker compose ps